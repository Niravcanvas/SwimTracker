{% extends "base.html" %}
{% block title %}Login - Swim Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
  <div class="col-md-7 col-lg-5">

    <div class="card glass border-0 shadow-sm auth-card">
      <div class="card-body p-4 p-md-5">

        <!-- Brand -->
        <div class="text-center mb-4">
          <div class="auth-logo mb-2">🏊</div>
          <h2 class="fw-bold mb-1">Welcome Back</h2>
          <p class="text-muted mb-0">Login to access your dashboard.</p>
        </div>

        <form method="post" class="mt-4">

          <div class="mb-3">
            <label class="form-label small text-muted">Email</label>
            <div class="input-group">
              <span class="input-group-text">📧</span>
              <input class="form-control"
                     type="email"
                     name="email"
                     placeholder="you@example.com"
                     required>
            </div>
          </div>

          <div class="mb-2">
            <label class="form-label small text-muted">Password</label>
            <div class="input-group">
              <span class="input-group-text">🔒</span>
              <input id="pw"
                     class="form-control"
                     type="password"
                     name="password"
                     placeholder="Your password"
                     required>
              <button class="btn btn-outline-secondary"
                      type="button"
                      onclick="togglePw()">
                👁
              </button>
            </div>
          </div>

          <button class="btn btn-primary w-100 mt-4">
            Login
          </button>

        </form>

        <div class="mt-4 text-center">
          <span class="text-muted">New here?</span>
          <a class="fw-semibold" href="{{ url_for('register') }}">
            Create an account
          </a>
        </div>

      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePw(){
  const el = document.getElementById("pw");
  el.type = (el.type === "password") ? "text" : "password";
}
</script>
{% endblock %}
