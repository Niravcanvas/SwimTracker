{% extends "base.html" %}
{% block title %}Login – Swim Tracker{% endblock %}

{% block head_extra %}
<style>
  /* ── Login page styles ── */
  .auth-wrap {
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--navy-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    box-shadow:
      0 0 0 1px rgba(0,194,168,0.06),
      0 24px 64px rgba(0,0,0,0.45);
    animation: cardIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0)    scale(1);    }
  }

  /* Brand block */
  .auth-brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 36px;
  }

  .auth-icon-ring {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--teal), #0099ff);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 28px rgba(0,194,168,0.3);
    margin-bottom: 16px;
  }
  .auth-icon-ring svg { color: #fff; width: 26px; height: 26px; }

  .auth-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.45rem;
    font-weight: 800;
    color: var(--text-1);
    margin: 0 0 6px;
    letter-spacing: 0.01em;
  }

  .auth-sub {
    font-size: 13.5px;
    color: var(--text-3);
    margin: 0;
  }

  /* Divider */
  .auth-divider {
    height: 1px;
    background: var(--border);
    margin: 0 0 28px;
  }

  /* Form fields */
  .field-group {
    margin-bottom: 18px;
  }

  .field-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 8px;
  }

  .field-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .field-icon {
    position: absolute;
    left: 13px;
    display: flex;
    pointer-events: none;
    color: var(--text-3);
  }
  .field-icon svg { width: 15px; height: 15px; }

  .field-input {
    width: 100%;
    background: var(--navy-3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-1);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 11px 14px 11px 38px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    -webkit-appearance: none;
  }
  .field-input::placeholder { color: var(--text-3); }
  .field-input:focus {
    border-color: rgba(0,194,168,0.45);
    box-shadow: 0 0 0 3px rgba(0,194,168,0.1);
    background: #0f1a36;
  }

  /* Password toggle */
  .field-input.has-toggle { padding-right: 44px; }

  .pw-toggle {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-3);
    padding: 4px;
    display: flex;
    align-items: center;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  .pw-toggle:hover { color: var(--text-2); background: rgba(255,255,255,0.06); }
  .pw-toggle svg { width: 15px; height: 15px; }

  /* Submit button */
  .btn-submit {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--teal), #0099dd);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
    box-shadow: 0 4px 18px rgba(0,194,168,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-submit svg { width: 15px; height: 15px; }
  .btn-submit:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,194,168,0.35);
  }
  .btn-submit:active { transform: translateY(0); opacity: 1; }

  /* Footer link */
  .auth-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 13.5px;
    color: var(--text-3);
  }
  .auth-footer a {
    color: var(--teal);
    font-weight: 600;
    text-decoration: none;
    margin-left: 4px;
    transition: opacity 0.15s;
  }
  .auth-footer a:hover { opacity: 0.8; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-icon-ring">
        <i data-lucide="waves"></i>
      </div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-sub">Sign in to access your dashboard</p>
    </div>

    <div class="auth-divider"></div>

    <!-- Form -->
    <form method="post">

      <div class="field-group">
        <label class="field-label" for="email">Email</label>
        <div class="field-wrap">
          <span class="field-icon"><i data-lucide="mail"></i></span>
          <input
            id="email"
            class="field-input"
            type="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="pw">Password</label>
        <div class="field-wrap">
          <span class="field-icon"><i data-lucide="lock-keyhole"></i></span>
          <input
            id="pw"
            class="field-input has-toggle"
            type="password"
            name="password"
            placeholder="Your password"
            autocomplete="current-password"
            required>
          <button class="pw-toggle" type="button" onclick="togglePw()" aria-label="Toggle password visibility">
            <i id="pw-eye" data-lucide="eye"></i>
          </button>
        </div>
      </div>

      <button class="btn-submit" type="submit">
        <i data-lucide="log-in"></i>
        Sign In
      </button>

    </form>

    <div class="auth-footer">
      New here?
      <a href="{{ url_for('register') }}">Create an account</a>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  lucide.createIcons();

  function togglePw() {
    const input = document.getElementById('pw');
    const icon  = document.getElementById('pw-eye');
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.setAttribute('data-lucide', show ? 'eye-off' : 'eye');
    lucide.createIcons();
  }
</script>
{% endblock %}
